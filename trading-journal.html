<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Trading Journal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090b;color:#fff;font-family:'Courier New',monospace;min-height:100vh;font-size:14px}
.hdr{border-bottom:1px solid #27272a;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#09090b;z-index:10}
.htl{font-size:18px;font-weight:900}
.hsl{font-size:9px;color:#71717a;text-transform:uppercase;letter-spacing:2px}
.nav{display:flex;gap:6px}
.nb{font-size:11px;padding:6px 10px;border-radius:8px;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:1px;background:transparent;color:#71717a;font-family:inherit}
.nb.on{background:#fff;color:#000;font-weight:700}
.pg{display:none;max-width:640px;margin:0 auto;padding:16px}
.pg.on{display:block}
.sl{font-size:9px;color:#52525b;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;margin-top:14px}
.cd{background:#18181b;border:1px solid #27272a;border-radius:14px;padding:14px;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.sc{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:12px}
.sv{font-size:20px;font-weight:900}
.ss{font-size:10px;color:#71717a;margin-top:2px}
.gr{color:#34d399}.re{color:#f87171}.am{color:#fbbf24}
.wr{background:rgba(239,68,68,0.1);border:2px solid #ef4444;border-radius:12px;padding:12px 14px;display:flex;gap:10px;margin-bottom:12px;align-items:flex-start}
.wa{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.4);border-radius:12px;padding:10px 14px;display:flex;gap:10px;margin-bottom:12px;align-items:center}
.bt{height:7px;background:#27272a;border-radius:4px;overflow:hidden;margin-top:3px}
.bf{height:100%;border-radius:4px;transition:width 0.3s}
.fi{background:#18181b;border:1px solid #3f3f46;border-radius:10px;padding:8px 12px;font-size:13px;color:#fff;font-family:inherit;width:100%;outline:none}
.fi:focus{border-color:#71717a}
textarea.fi{resize:none}
.rb{padding:14px;border-radius:12px;font-size:18px;font-weight:900;border:2px solid #3f3f46;background:transparent;color:#52525b;cursor:pointer;font-family:inherit;width:100%;transition:all 0.15s}
.rb.wa2{background:rgba(52,211,153,0.15);border-color:#34d399;color:#34d399}
.rb.la2{background:rgba(248,113,113,0.15);border-color:#f87171;color:#f87171}
.eb{font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid #3f3f46;background:transparent;color:#71717a;cursor:pointer;font-family:inherit;transition:all 0.15s}
.eb.on{border-color:#fff;color:#fff;background:#27272a}
.ew{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.pb{padding:10px;border-radius:10px;font-size:12px;font-weight:700;border:2px solid #3f3f46;background:transparent;color:#71717a;cursor:pointer;font-family:inherit;width:100%;transition:all 0.15s}
.pb.ya{border-color:#34d399;color:#34d399;background:rgba(52,211,153,0.1)}
.pb.na{border-color:#f87171;color:#f87171;background:rgba(248,113,113,0.1)}
.trow{display:flex;align-items:center;justify-content:space-between;background:#18181b;border:1px solid #27272a;border-radius:10px;padding:12px 14px;margin-bottom:12px}
.tg{width:44px;height:22px;border-radius:999px;background:#3f3f46;border:none;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0}
.tg.on{background:#f59e0b}
.tk{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left 0.2s}
.tg.on .tk{left:25px}
.iu{border:2px dashed #3f3f46;border-radius:10px;min-height:70px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
.iu img{width:100%;height:85px;object-fit:cover}
.sb{width:100%;padding:14px;border-radius:12px;background:#fff;color:#000;font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:1px;border:none;cursor:pointer;font-family:inherit;margin-top:4px}
.sb:disabled{opacity:0.3;cursor:not-allowed}
.tc{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.bdg{font-size:10px;padding:2px 7px;border-radius:999px}
.bdgg{background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.3)}
.bdgr{background:rgba(248,113,113,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.3)}
.bdga{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)}
.xb{flex:1;padding:8px;border-radius:8px;border:1px solid #3f3f46;background:transparent;color:#a1a1aa;font-family:inherit;font-size:10px;text-transform:uppercase;cursor:pointer}
.pi{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #27272a;font-size:12px;color:#d4d4d8}
.pi:last-child{border-bottom:none}
.piarr{color:#34d399;flex-shrink:0}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="hsl">Trading</div><div class="htl">JOURNAL</div></div>
  <div class="nav">
    <button class="nb on" onclick="go('dash')">Stats</button>
    <button class="nb" onclick="go('log')">+ Trade</button>
    <button class="nb" onclick="go('hist')">Hist.</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash" class="pg on"></div>

<!-- LOG - static HTML, never rebuilt -->
<div id="log" class="pg">
  <div id="log-warn"></div>
  <div class="sl" style="margin-top:0">Registar Trade</div>
  <div class="g3">
    <div><div class="sl">Data</div><input type="date" class="fi" id="fd"></div>
    <div><div class="sl">Hora</div><input type="time" class="fi" id="ft"></div>
    <div><div class="sl">Ativo</div><input type="text" class="fi" id="fa" placeholder="SP500" oninput="chk()"></div>
  </div>
  <div style="margin-bottom:12px">
    <div class="sl">Resultado</div>
    <div class="g2" style="margin-top:6px;margin-bottom:0">
      <button class="rb" id="bw" onclick="setR('W')">WIN ✓</button>
      <button class="rb" id="bl" onclick="setR('L')">LOSS ✗</button>
    </div>
  </div>
  <div style="margin-bottom:12px"><div class="sl">Estado antes</div><div class="ew" id="eb"></div></div>
  <div style="margin-bottom:12px"><div class="sl">Estado depois</div><div class="ew" id="ea"></div></div>
  <div style="margin-bottom:12px">
    <div class="sl">Seguiu o plano?</div>
    <div class="g2" style="margin-top:6px;margin-bottom:0">
      <button class="pb" id="bpy" onclick="setFp(true)">✓ Sim</button>
      <button class="pb" id="bpn" onclick="setFp(false)">✗ Não</button>
    </div>
  </div>
  <div class="trow">
    <span style="color:#d4d4d8">Trade forçada?</span>
    <button class="tg" id="ftg" onclick="togFc()"><div class="tk"></div></button>
  </div>
  <div style="margin-bottom:12px"><div class="sl">Notas</div><textarea class="fi" id="fn" rows="3" placeholder="O que aconteceu..."></textarea></div>
  <div class="g2" style="margin-bottom:12px">
    <div><div class="sl">Print Antes</div>
      <div class="iu" onclick="document.getElementById('upb').click()">
        <img id="pvb" style="display:none;width:100%;height:85px;object-fit:cover">
        <span id="lbb" style="font-size:11px;color:#52525b">+ Upload</span>
      </div>
      <input type="file" id="upb" accept="image/*" style="display:none" onchange="hImg('b',this)">
    </div>
    <div><div class="sl">Print Depois</div>
      <div class="iu" onclick="document.getElementById('upa').click()">
        <img id="pva" style="display:none;width:100%;height:85px;object-fit:cover">
        <span id="lba" style="font-size:11px;color:#52525b">+ Upload</span>
      </div>
      <input type="file" id="upa" accept="image/*" style="display:none" onchange="hImg('a',this)">
    </div>
  </div>
  <button class="sb" id="sbtn" onclick="saveTrade()" disabled>Guardar Trade</button>
</div>

<!-- HISTORY -->
<div id="hist" class="pg"></div>

<script>
// ── STATE ──────────────────────────────────────────────
var trades = JSON.parse(localStorage.getItem('tj') || '[]');
var fResult = '';
var fEb = '';
var fEa = '';
var fFp = null;
var fFc = false;
var fIb = null;
var fIa = null;
var expId = null;
var EM = ["😌 Calmo","😤 Frustrado","😰 Nervoso","😎 Confiante","😔 Em baixo","🔥 Focado"];

// ── UTILS ──────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0,10); }
function nowTime() { return new Date().toTimeString().slice(0,5); }
function persist() { localStorage.setItem('tj', JSON.stringify(trades)); }
function barColor(p) { return p>75?'#f87171':p>50?'#fbbf24':'#34d399'; }
function barGrad(p) { return p>75?'linear-gradient(to right,#f87171,#dc2626)':p>50?'linear-gradient(to right,#fbbf24,#d97706)':'linear-gradient(to right,#34d399,#059669)'; }

function consLossToday() {
  var t = today();
  var arr = trades.filter(function(x){return x.date===t;}).sort(function(a,b){return b.id-a.id;});
  var c = 0;
  for (var i=0; i<arr.length; i++) { if(arr[i].r==='W') break; c++; }
  return c;
}

// ── NAVIGATION ────────────────────────────────────────
function go(v) {
  document.querySelectorAll('.pg').forEach(function(p){ p.classList.remove('on'); });
  document.getElementById(v).classList.add('on');
  document.querySelectorAll('.nb').forEach(function(b,i){ b.classList.toggle('on', ['dash','log','hist'][i]===v); });
  if (v==='dash') renderDash();
  if (v==='log')  initLog();
  if (v==='hist') renderHist();
}

// ── DASHBOARD ─────────────────────────────────────────
function renderDash() {
  var t = today();
  var tod = trades.filter(function(x){return x.date===t;});
  var tw = tod.filter(function(x){return x.r==='W';}).length;
  var tl = tod.filter(function(x){return x.r==='L';}).length;
  var wins = trades.filter(function(x){return x.r==='W';}).length;
  var losses = trades.filter(function(x){return x.r==='L';}).length;
  var total = trades.length;
  var wr = total ? Math.round(wins/total*100) : 0;
  var forced = trades.filter(function(x){return x.fc;}).length;
  var cl = consLossToday();
  var calcPnl = (wins*1200) - (losses*750);
  var adj = parseFloat(localStorage.getItem('tj-adj')||'0') || 0;
  var pnl = calcPnl + adj;
  var dL = Math.max(0, (tl*750)-(tw*1200));
  var tDD = Math.max(0, -pnl);
  var pp = Math.min(Math.max(pnl/8000*100, 0), 100);
  var dp = Math.min(dL/4000*100, 100);
  var tp = Math.min(tDD/9000*100, 100);

  // warnings
  var warn = '';
  if (dp>=100||tp>=100) warn='<div class="wr"><span style="font-size:20px">🚨</span><div><div style="font-weight:900;color:#f87171;font-size:11px;text-transform:uppercase">LIMITE ATINGIDO</div><div style="color:#fca5a5;font-size:12px;margin-top:2px">Fecha todas as posições agora.</div></div></div>';
  else if (dp>=75||tp>=75) warn='<div class="wa"><span style="font-size:18px">⚠️</span><div style="color:#fde68a;font-size:12px">Próximo do limite — cautela máxima.</div></div>';
  else if (cl>=2) warn='<div class="wr"><span style="font-size:20px">⚠️</span><div><div style="font-weight:900;color:#f87171;font-size:11px;text-transform:uppercase">PLANO DIZ PARA PARAR</div><div style="color:#fca5a5;font-size:12px;margin-top:2px">'+cl+' losses consecutivas hoje.</div></div></div>';
  else if (cl===1) warn='<div class="wa"><span style="font-size:18px">🟡</span><div style="color:#fde68a;font-size:12px">1 loss consecutiva — próxima L para o dia.</div></div>';

  // weekly
  var wmap = {};
  trades.forEach(function(x){
    var d = new Date(x.date); var dy = d.getDay();
    var m = new Date(x.date); m.setDate(m.getDate()-dy+(dy===0?-6:1));
    var k = m.toISOString().slice(0,10);
    if(!wmap[k]) wmap[k]=[]; wmap[k].push(x);
  });
  var wk = '';
  Object.entries(wmap).sort(function(a,b){return b[0]<a[0]?-1:1;}).slice(0,4).forEach(function(e){
    var w2=e[1].filter(function(x){return x.r==='W';}).length;
    var l2=e[1].filter(function(x){return x.r==='L';}).length;
    var wr2=Math.round(w2/e[1].length*100);
    wk+='<div style="background:#18181b;border:1px solid #27272a;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
      '<div><div style="font-size:9px;color:#71717a">'+e[0]+'</div><div style="font-size:12px;font-weight:700">'+e[1].length+' trades</div></div>'+
      '<div style="display:flex;gap:5px"><span class="bdg bdgg">'+w2+'W</span><span class="bdg bdgr">'+l2+'L</span><span class="bdg '+(wr2>=45?'bdgg':'bdgr')+'">'+wr2+'%</span></div></div>';
  });

  document.getElementById('dash').innerHTML =
    warn +
    '<div class="cd">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">' +
        '<div><div style="font-size:9px;color:#71717a;text-transform:uppercase;letter-spacing:2px;margin-bottom:3px">Top One Trader — 2-Step Pro</div>' +
        '<div style="font-size:20px;font-weight:900">$100,000 <span style="font-size:11px;color:#71717a;font-weight:400">Fase 1</span></div></div>' +
        '<div style="text-align:right">' +
          '<div style="font-size:9px;color:#71717a;margin-bottom:4px">AJUSTE ($)</div>' +
          '<input id="adj-in" type="number" placeholder="0" value="'+(adj||'')+'" style="background:#09090b;border:2px solid #3f3f46;border-radius:10px;padding:6px 10px;font-size:18px;font-weight:900;color:#fff;font-family:inherit;width:115px;outline:none;text-align:right" oninput="sAdj(this.value)">' +
          '<div style="font-size:9px;color:'+(adj!==0?'#fbbf24':'#52525b')+';margin-top:3px">'+(adj!==0?'⚠ ajuste ativo':'✓ calculado')+'</div>' +
        '</div>' +
      '</div>' +
      '<div class="g3" style="margin-bottom:12px">' +
        '<div style="background:#09090b;border-radius:12px;padding:12px;text-align:center;border:1px solid #27272a"><div style="font-size:9px;color:#71717a;margin-bottom:5px">PROFIT</div><div style="font-size:22px;font-weight:900;color:'+(pnl>=0?'#34d399':'#f87171')+'">'+(pnl>=0?'+$':'-$')+Math.abs(pnl).toLocaleString()+'</div><div style="font-size:9px;color:#71717a;margin-top:2px">'+pp.toFixed(1)+'% / 8%</div></div>' +
        '<div style="background:#09090b;border-radius:12px;padding:12px;text-align:center;border:1px solid #27272a"><div style="font-size:9px;color:#71717a;margin-bottom:5px">DD HOJE</div><div style="font-size:22px;font-weight:900;color:'+barColor(dp)+'">-$'+dL.toLocaleString()+'</div><div style="font-size:9px;color:#71717a;margin-top:2px">'+dp.toFixed(1)+'% / 4%</div></div>' +
        '<div style="background:#09090b;border-radius:12px;padding:12px;text-align:center;border:1px solid #27272a"><div style="font-size:9px;color:#71717a;margin-bottom:5px">DD TOTAL</div><div style="font-size:22px;font-weight:900;color:'+barColor(tp)+'">-$'+tDD.toLocaleString()+'</div><div style="font-size:9px;color:#71717a;margin-top:2px">'+tp.toFixed(1)+'% / 9%</div></div>' +
      '</div>' +
      '<div style="display:flex;flex-direction:column;gap:8px">' +
        '<div><div style="display:flex;justify-content:space-between;font-size:9px;color:#71717a;margin-bottom:3px"><span>🎯 PROFIT</span><span>$'+pnl.toLocaleString()+' / $8,000</span></div><div class="bt"><div class="bf" style="width:'+pp+'%;background:'+(pnl>=0?barGrad(0):'linear-gradient(to right,#f87171,#dc2626)')+'"></div></div></div>' +
        '<div><div style="display:flex;justify-content:space-between;font-size:9px;color:#71717a;margin-bottom:3px"><span>⚡ DD DIÁRIO</span><span>-$'+dL.toLocaleString()+' / $4,000</span></div><div class="bt"><div class="bf" style="width:'+dp+'%;background:'+barGrad(dp)+'"></div></div></div>' +
        '<div><div style="display:flex;justify-content:space-between;font-size:9px;color:#71717a;margin-bottom:3px"><span>🔒 DD TOTAL</span><span>-$'+tDD.toLocaleString()+' / $9,000</span></div><div class="bt"><div class="bf" style="width:'+tp+'%;background:'+barGrad(tp)+'"></div></div></div>' +
      '</div>' +
    '</div>' +
    '<div class="sl">Hoje</div>' +
    '<div class="g3"><div class="sc"><div class="sl" style="margin-top:0">Trades</div><div class="sv">'+tod.length+'</div></div><div class="sc"><div class="sl" style="margin-top:0">W</div><div class="sv gr">'+tw+'</div></div><div class="sc"><div class="sl" style="margin-top:0">L</div><div class="sv re">'+tl+'</div></div></div>' +
    '<div class="sl">Total</div>' +
    '<div class="g2"><div class="sc"><div class="sl" style="margin-top:0">Winrate</div><div class="sv '+(wr>=45?'gr':'re')+'">'+wr+'%</div><div class="ss">'+wins+'W / '+losses+'L</div></div><div class="sc"><div class="sl" style="margin-top:0">Trades</div><div class="sv">'+total+'</div><div class="ss '+(calcPnl>=0?'gr':'re')+'">'+(calcPnl>=0?'+':'-')+'$'+Math.abs(calcPnl).toLocaleString()+'</div></div><div class="sc"><div class="sl" style="margin-top:0">Forçadas</div><div class="sv am">'+forced+'</div><div class="ss">'+(total?Math.round(forced/total*100):0)+'%</div></div><div class="sc"><div class="sl" style="margin-top:0">Loss consec.</div><div class="sv '+(cl>=2?'re':cl===1?'am':'gr')+'">'+cl+'</div><div class="ss">hoje</div></div></div>' +
    '<div class="sl">O Plano</div>' +
    '<div class="cd"><div class="pi"><span class="piarr">▸</span>1 entrada por ideia — sem adições</div><div class="pi"><span class="piarr">▸</span>Risco: 0.75% por trade ($750)</div><div class="pi"><span class="piarr">▸</span>R/R: 1:1.6</div><div class="pi"><span class="piarr">▸</span>2 losses seguidas → parar o dia</div><div class="pi"><span class="piarr">▸</span>Escritório → não operas</div><div class="pi"><span class="piarr">▸</span>Checagem 30s antes de abrir</div></div>' +
    (wk ? '<div class="sl">Semanal</div>'+wk : '');
}

function sAdj(v) { localStorage.setItem('tj-adj', v||'0'); }

// ── LOG FORM ───────────────────────────────────────────
function initLog() {
  // reset form state
  fResult=''; fEb=''; fEa=''; fFp=null; fFc=false; fIb=null; fIa=null;

  // warnings
  var cl = consLossToday();
  document.getElementById('log-warn').innerHTML = cl>=2 ?
    '<div class="wr" style="margin-bottom:12px"><span>⚠️</span><div style="color:#fca5a5;font-weight:700;font-size:12px">Plano diz para parar — '+cl+' losses hoje.</div></div>' : '';

  // reset fields
  document.getElementById('fd').value = today();
  document.getElementById('ft').value = nowTime();
  document.getElementById('fa').value = '';
  document.getElementById('fn').value = '';

  // reset buttons
  document.getElementById('bw').className = 'rb';
  document.getElementById('bl').className = 'rb';
  document.getElementById('bpy').className = 'pb';
  document.getElementById('bpn').className = 'pb';
  document.getElementById('ftg').className = 'tg';
  document.getElementById('ftg').innerHTML = '<div class="tk"></div>';

  // reset images
  document.getElementById('pvb').style.display = 'none';
  document.getElementById('lbb').style.display = '';
  document.getElementById('pva').style.display = 'none';
  document.getElementById('lba').style.display = '';

  // disable save
  document.getElementById('sbtn').disabled = true;

  // build emotion buttons
  var eb = document.getElementById('eb'); eb.innerHTML='';
  var ea = document.getElementById('ea'); ea.innerHTML='';
  EM.forEach(function(e) {
    var b1 = document.createElement('button');
    b1.className = 'eb'; b1.textContent = e;
    b1.addEventListener('click', function() {
      fEb = e;
      document.querySelectorAll('#eb .eb').forEach(function(x){ x.classList.remove('on'); });
      b1.classList.add('on');
    });
    eb.appendChild(b1);

    var b2 = document.createElement('button');
    b2.className = 'eb'; b2.textContent = e;
    b2.addEventListener('click', function() {
      fEa = e;
      document.querySelectorAll('#ea .eb').forEach(function(x){ x.classList.remove('on'); });
      b2.classList.add('on');
    });
    ea.appendChild(b2);
  });
}

function chk() {
  var a = document.getElementById('fa').value.trim();
  document.getElementById('sbtn').disabled = !fResult || !a;
}

function setR(r) {
  fResult = r;
  document.getElementById('bw').className = 'rb' + (r==='W' ? ' wa2' : '');
  document.getElementById('bl').className = 'rb' + (r==='L' ? ' la2' : '');
  chk();
}

function setFp(v) {
  fFp = v;
  document.getElementById('bpy').className = 'pb' + (v===true ? ' ya' : '');
  document.getElementById('bpn').className = 'pb' + (v===false ? ' na' : '');
}

function togFc() {
  fFc = !fFc;
  var tg = document.getElementById('ftg');
  tg.className = 'tg' + (fFc ? ' on' : '');
  tg.innerHTML = '<div class="tk"></div>';
}

function hImg(t, inp) {
  var f = inp.files[0]; if(!f) return;
  var r = new FileReader();
  r.onload = function(ev) {
    if (t==='b') {
      fIb = ev.target.result;
      document.getElementById('pvb').src = ev.target.result;
      document.getElementById('pvb').style.display = 'block';
      document.getElementById('lbb').style.display = 'none';
    } else {
      fIa = ev.target.result;
      document.getElementById('pva').src = ev.target.result;
      document.getElementById('pva').style.display = 'block';
      document.getElementById('lba').style.display = 'none';
    }
  };
  r.readAsDataURL(f);
}

function saveTrade() {
  var asset = document.getElementById('fa').value.trim();
  if (!fResult || !asset) return;
  var trade = {
    id: Date.now(),
    date: document.getElementById('fd').value,
    time: document.getElementById('ft').value,
    asset: asset,
    r: fResult,
    eb: fEb, ea: fEa, fp: fFp, fc: fFc,
    notes: document.getElementById('fn').value,
    ib: fIb, ia: fIa
  };
  trades.unshift(trade);
  persist();
  go('dash');
}

// ── HISTORY ───────────────────────────────────────────
function renderHist() {
  var h = '<div style="display:flex;gap:8px;margin-bottom:14px">' +
    '<button class="xb" onclick="expD()">⬇ Exportar</button>' +
    '<button class="xb" onclick="document.getElementById(\'imp\').click()">⬆ Importar</button>' +
    '<input type="file" id="imp" accept=".json" style="display:none" onchange="impD(this)">' +
    '</div>';

  if (!trades.length) {
    h += '<div style="text-align:center;color:#52525b;padding:48px 0;font-size:12px">Sem trades ainda.<br><button onclick="go(\'log\')" style="color:#fff;background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;margin-top:8px">+ Registar</button></div>';
    document.getElementById('hist').innerHTML = h; return;
  }

  var byDay = {};
  trades.forEach(function(t){ if(!byDay[t.date]) byDay[t.date]=[]; byDay[t.date].push(t); });

  Object.entries(byDay).sort(function(a,b){return b[0]<a[0]?-1:1;}).forEach(function(e) {
    var w = e[1].filter(function(x){return x.r==='W';}).length;
    var l = e[1].filter(function(x){return x.r==='L';}).length;
    h += '<div style="margin-bottom:14px">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:6px">' +
        '<span style="font-size:10px;color:#71717a">'+e[0]+'</span>' +
        '<div style="display:flex;gap:5px"><span class="bdg bdgg">'+w+'W</span><span class="bdg bdgr">'+l+'L</span></div>' +
      '</div>';

    e[1].forEach(function(t) {
      var ex = expId===t.id;
      h += '<div class="tc">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="togExp('+t.id+')">' +
          '<div style="display:flex;align-items:center;gap:10px">' +
            '<span style="font-size:18px;font-weight:900;color:'+(t.r==='W'?'#34d399':'#f87171')+'">'+t.r+'</span>' +
            '<div><div style="font-size:12px;font-weight:700">'+t.asset+'</div><div style="font-size:10px;color:#71717a">'+t.time+'</div></div>' +
          '</div>' +
          '<div style="display:flex;gap:5px;align-items:center">' +
            (t.fc?'<span class="bdg bdga">Forçada</span>':'') +
            (t.fp===true?'<span class="bdg bdgg">Plano ✓</span>':'') +
            (t.fp===false?'<span class="bdg bdgr">Plano ✗</span>':'') +
            '<button onclick="event.stopPropagation();edT('+t.id+')" style="background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:#00d4ff;border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;font-family:inherit">✎</button>' +
            '<button onclick="event.stopPropagation();dlT('+t.id+')" style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:#f87171;border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;font-family:inherit">✕</button>' +
          '</div>' +
        '</div>' +
        (ex ?
          '<div style="margin-top:10px;padding-top:10px;border-top:1px solid #27272a;display:flex;flex-direction:column;gap:8px">' +
            ((t.eb||t.ea) ? '<div style="display:flex;gap:14px;font-size:12px">'+(t.eb?'<div><span style="font-size:9px;color:#71717a">Antes </span>'+t.eb+'</div>':'')+(t.ea?'<div><span style="font-size:9px;color:#71717a">Depois </span>'+t.ea+'</div>':'')+'</div>' : '') +
            (t.notes ? '<div style="font-size:12px;color:#a1a1aa">'+t.notes+'</div>' : '') +
            ((t.ib||t.ia) ? '<div class="g2">'+(t.ib?'<div><div style="font-size:9px;color:#71717a;margin-bottom:3px">Antes</div><img src="'+t.ib+'" style="width:100%;border-radius:8px"></div>':'')+(t.ia?'<div><div style="font-size:9px;color:#71717a;margin-bottom:3px">Depois</div><img src="'+t.ia+'" style="width:100%;border-radius:8px"></div>':'')+'</div>' : '') +
          '</div>' : '') +
        '</div>';
    });
    h += '</div>';
  });

  document.getElementById('hist').innerHTML = h;
}

function togExp(id) { expId = expId===id ? null : id; renderHist(); }

function dlT(id) {
  if (!confirm('Apagar esta trade?')) return;
  trades = trades.filter(function(x){return x.id!==id;});
  persist(); renderHist(); renderDash();
}

function edT(id) {
  var t = trades.find(function(x){return x.id===id;});
  if (!t) return;
  trades = trades.filter(function(x){return x.id!==id;});
  persist();
  go('log');
  setTimeout(function(){
    document.getElementById('fd').value = t.date;
    document.getElementById('ft').value = t.time;
    document.getElementById('fa').value = t.asset;
    document.getElementById('fn').value = t.notes||'';
    if (t.r) setR(t.r);
    if (t.fp!==null) setFp(t.fp);
    if (t.fc) { fFc=true; document.getElementById('ftg').className='tg on'; document.getElementById('ftg').innerHTML='<div class="tk"></div>'; }
    if (t.ib) { fIb=t.ib; document.getElementById('pvb').src=t.ib; document.getElementById('pvb').style.display='block'; document.getElementById('lbb').style.display='none'; }
    if (t.ia) { fIa=t.ia; document.getElementById('pva').src=t.ia; document.getElementById('pva').style.display='block'; document.getElementById('lba').style.display='none'; }
    // restore emotion buttons
    if (t.eb) { fEb=t.eb; document.querySelectorAll('#eb .eb').forEach(function(b){ if(b.textContent===t.eb) b.classList.add('on'); }); }
    if (t.ea) { fEa=t.ea; document.querySelectorAll('#ea .eb').forEach(function(b){ if(b.textContent===t.ea) b.classList.add('on'); }); }
    chk();
  }, 50);
}

function expD() {
  var blob = new Blob([JSON.stringify(trades,null,2)], {type:'application/json'});
  var a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='tj-backup.json'; a.click();
}
function impD(input) {
  var f = input.files[0]; if(!f) return;
  var r = new FileReader();
  r.onload = function(ev){ try{ trades=JSON.parse(ev.target.result); persist(); renderHist(); } catch(e){ alert('Ficheiro inválido'); } };
  r.readAsText(f);
}

// ── INIT ──────────────────────────────────────────────
renderDash();
</script>
</body>
</html>
